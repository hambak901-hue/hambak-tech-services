<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Orders | HAMBAK</title>
    <script src="js/sessionGuard.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin:0; font-family:Arial, sans-serif; background:#0f172a; color:white; }
        .admin-container { display:flex; min-height:100vh; }
        .sidebar { width:260px; background:#081120; padding:30px 20px; position:fixed; height:100%; }
        .logo h2 { color:#f5b942; text-align:center; }
        .menu a { text-decoration:none; color:#cbd5e1; padding:14px; border-radius:12px; display:flex; align-items:center; gap:12px; transition:0.3s; }
        .menu a:hover, .menu a.active { background:#0d47a1; color:white; }
        .main { margin-left:260px; flex:1; padding:40px; }
        .table-box { background:#1e293b; padding:30px; border-radius:20px; overflow:auto; }
        table { width:100%; border-collapse:collapse; text-align:left; }
        table th, table td { padding:15px; border-bottom:1px solid rgba(255,255,255,0.1); }
        table th { background:#0d47a1; }
        .status-select { padding:6px; border-radius:6px; background:#0f172a; color:white; border:1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="sidebar">
        <div class="logo"><h2>HAMBAK</h2><p>ADMIN PANEL</p></div>
        <div class="menu">
            <a href="admin.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="admin-services.html"><i class="fa-solid fa-briefcase"></i> Services</a>
            <a href="admin-users.html"><i class="fa-solid fa-users"></i> Users</a>
            <a href="admin-orders.html" class="active"><i class="fa-solid fa-cart-shopping"></i> Orders</a>
        </div>
    </div>
    <div class="main">
        <h1>Ecosystem Universal Order Manifest</h1>
        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>Order Reference</th>
                        <th>Resource Service</th>
                        <th>Amount</th>
                        <th>Status Control Matrix</th>
                    </tr>
                </thead>
                <tbody id="masterOrdersTable"></tbody>
            </table>
        </div>
    </div>
</div>
<script>
    const API_URL = "https://hambak-tech-services.onrender.com/api";
    const token = localStorage.getItem("token") || localStorage.getItem("hambak_token");

    async function loadAllSystemOrders() {
        try {
            // FIXED: Connects seamlessly to the total back-office manifest node
            const res = await fetch(`${API_URL}/admin/orders`, {
                headers: { "Authorization": `Bearer ${token}` }
            });
            const data = await res.json();
            const table = document.getElementById("masterOrdersTable");
            table.innerHTML = "";

            const ordersList = Array.isArray(data) ? data : (data.orders || []);

            if(ordersList.length === 0) {
                table.innerHTML = `<tr><td colspan="4" style="text-align:center;">No universal order transactions log recorded yet.</td></tr>`;
                return;
            }

            ordersList.forEach(o => {
                table.innerHTML += `
                <tr>
                    <td><code>${o.orderRef || o._id}</code></td>
                    <td>${o.serviceName || 'Custom Blueprint Service'}</td>
                    <td>₦${Number(o.totalPrice || o.price || 0).toLocaleString()}</td>
                    <td>
                        <select class="status-select" onchange="updateOrderStatus('${o._id}', this.value)">
                            <option value="Pending" ${o.status==='Pending'?'selected':''}>Pending</option>
                            <option value="Processing" ${o.status==='Processing'?'selected':''}>Processing</option>
                            <option value="Completed" ${o.status==='Completed'?'selected':''}>Completed</option>
                            <option value="Failed" ${o.status==='Failed'?'selected':''}>Failed</option>
                        </select>
                    </td>
                </tr>`;
            });
        } catch (err) { console.error("Error pulling master manifest array:", err); }
    }

    async function updateOrderStatus(id, nextStatus) {
        try {
            const res = await fetch(`${API_URL}/admin/orders/${id}/status`, {
                method: "PUT",
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ status: nextStatus })
            });
            if(res.ok) { alert("Order state tracking vector synchronized successfully!"); }
        } catch (err) { console.error(err); }
    }

    loadAllSystemOrders();
</script>
</body>
</html>
