<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Register | HAMBAK TECH & SERVICES</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ==========================================================================
       PREMIUM BRAND COLOR PALETTE (BLUE, GOLD, PEACH, PINK)
       ========================================================================== */
    :root {
      --primary-blue: #0d47a1;
      --deep-navy: #081120;
      --brand-gold: #f5b942;
      --soft-peach: #ffdfd3;
      --accent-pink: #ff4081;
      --clean-white: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: var(--deep-navy); 
      color: var(--clean-white);
      min-height: 100vh;
    }
    
    /* NAVBAR */
    .navbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 8%; background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      position: sticky; top: 0; z-index: 1000;
    }
    .logo { display: flex; flex-direction: column; }
    .logo span { font-size: 1.8rem; font-weight: 800; color: var(--brand-gold); letter-spacing: 1px; }
    .logo small { color: var(--clean-white); font-weight: 600; font-size: 0.75rem; letter-spacing: 2px; }
    .nav-links { display: flex; gap: 30px; }
    .nav-links a { text-decoration: none; color: var(--clean-white); font-weight: 600; transition: 0.3s ease; }
    .nav-links a:hover { color: var(--brand-gold); }

    /* AUTH PANEL LAYOUT */
    .auth-section {
      min-height: calc(100vh - 85px); display: flex; justify-content: center;
      align-items: center; padding: 40px 20px;
      background: radial-gradient(circle at top right, rgba(13, 71, 161, 0.4), transparent), var(--deep-navy);
    }
    
    .auth-container {
      width: 100%; max-width: 480px; background: var(--clean-white);
      padding: 40px; border-radius: 24px; 
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      border: 2px solid var(--soft-peach);
      position: relative; overflow: hidden;
    }

    /* Premium Design Accent Line */
    .auth-container::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
      background: linear-gradient(90deg, var(--primary-blue), var(--brand-gold), var(--accent-pink));
    }

    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-header h1 { font-size: 2.2rem; color: var(--deep-navy); font-weight: 800; margin-bottom: 8px; }
    .auth-header p { color: #64748b; font-size: 0.95rem; }

    /* STRUCTURED INPUT FIELDS */
    .auth-form { display: flex; flex-direction: column; gap: 20px; }
    .input-group { position: relative; }
    .input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 1.1rem; }
    
    .input-group input { 
      width: 100%; padding: 16px 16px 16px 48px; 
      border: 1px solid #cbd5e1; border-radius: 12px; 
      font-size: 1rem; color: var(--deep-navy); outline: none; 
      transition: all 0.3s ease; background: #f8fafc;
    }
    .input-group input:focus { 
      border-color: var(--primary-blue); background: var(--clean-white);
      box-shadow: 0 0 0 4px rgba(13, 71, 161, 0.1);
    }

    /* ACTION BUTTON MATRIX */
    .auth-btn { 
      padding: 16px; border: none; border-radius: 12px; 
      background: linear-gradient(135deg, var(--primary-blue), #1565c0); 
      color: var(--clean-white); font-size: 1rem; font-weight: 700; 
      cursor: pointer; transition: all 0.3s ease; letter-spacing: 0.5px;
      box-shadow: 0 4px 12px rgba(13, 71, 161, 0.3);
    }
    .auth-btn:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 6px 20px rgba(13, 71, 161, 0.4);
    }
    .auth-btn:active { transform: translateY(0); }
    .auth-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

    .auth-switch { text-align: center; margin-top: 24px; color: #64748b; font-size: 0.95rem; }
    .auth-switch span { color: var(--primary-blue); cursor: pointer; font-weight: 700; transition: 0.2s; }
    .auth-switch span:hover { color: var(--accent-pink); text-decoration: underline; }

    .forgot-password { text-align: right; margin-top: -10px; }
    .forgot-password a { color: var(--primary-blue); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.2s; }
    .forgot-password a:hover { color: var(--accent-pink); }

    .info-badge { 
      margin-top: 28px; padding: 16px; 
      background: var(--soft-peach); border-radius: 12px; 
      font-size: 0.85rem; color: var(--deep-navy); line-height: 1.5;
      border-left: 4px solid var(--accent-pink); font-weight: 500;
    }

    .whatsapp-float { 
      position: fixed; width: 60px; height: 60px; bottom: 25px; right: 25px; 
      background: #25d366; color: white; border-radius: 50%; 
      display: flex; justify-content: center; align-items: center; 
      font-size: 2rem; text-decoration: none; box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
      z-index: 1000; transition: 0.3s ease;
    }
    .whatsapp-float:hover { transform: scale(1.1); }

    @media(max-width: 768px) {
      .navbar { flex-direction: column; gap: 15px; padding: 15px; }
      .nav-links { gap: 20px; }
      .auth-container { padding: 30px 20px; }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo">
      <span>HAMBAK</span>
      <small>TECH & SERVICES</small>
    </div>
    <nav class="nav-links">
      <a href="../index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="shop.html">Shop</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="auth-section">
    <div class="auth-container">
      
      <div class="auth-header">
        <h1 id="formTitle">Customer Login</h1>
        <p id="formSubtitle">Access your dashboard & services</p>
      </div>

      <form class="auth-form" id="authForm" autocomplete="on">
        
        <div class="input-group" id="nameWrapper" style="display:none">
          <i class="fa-solid fa-user"></i>
          <input type="text" placeholder="Full Name" id="nameField" name="username" autocomplete="name">
        </div>

        <div class="input-group" id="usernameWrapper" style="display:none">
          <i class="fa-solid fa-at"></i>
          <input type="text" placeholder="Username" id="usernameField" name="nickname" autocomplete="username">
        </div>

        <div class="input-group" id="phoneWrapper" style="display:none">
          <i class="fa-solid fa-phone"></i>
          <input type="tel" placeholder="Phone Number" id="phoneField" name="phone" autocomplete="tel">
        </div>

        <div class="input-group">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" placeholder="Email Address or Username" id="emailField" name="email" autocomplete="email" required>
        </div>

        <div class="input-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password" placeholder="Password" id="passwordField" name="password" autocomplete="current-password" required>
          <span id="togglePassword" style="position:absolute; right:15px; top:50%; transform:translateY(-50%); cursor:pointer; color:#64748b;">
            <i class="fa-solid fa-eye"></i>
          </span>
        </div>

        <div class="forgot-password" id="forgotPasswordWrapper">
          <a href="forgot-password.html">Forgot Password?</a>
        </div>

        <button type="submit" class="auth-btn" id="submitBtn">Login</button>
      </form>

      <div class="auth-switch">
        <span id="toggleForm">Create New Account</span>
      </div>

      <div class="info-badge">
        <strong>Ecosystem Status:</strong> Verified Connection Cluster Live. Ready for launch.
      </div>

    </div>
  </section>

  <a href="https://wa.me/2349155104724" class="whatsapp-float" target="_blank" rel="noopener noreferrer">
    <i class="fa-brands fa-whatsapp"></i>
  </a>

  <script>
    const authForm = document.getElementById("authForm");
    const toggleForm = document.getElementById("toggleForm");
    const formTitle = document.getElementById("formTitle");
    const formSubtitle = document.getElementById("formSubtitle");
    const submitBtn = document.getElementById("submitBtn");
    const forgotPasswordWrapper = document.getElementById("forgotPasswordWrapper");

    const nameWrapper = document.getElementById("nameWrapper");
    const usernameWrapper = document.getElementById("usernameWrapper");
    const phoneWrapper = document.getElementById("phoneWrapper");

    const nameField = document.getElementById("nameField");
    const usernameField = document.getElementById("usernameField");
    const phoneField = document.getElementById("phoneField");
    const emailField = document.getElementById("emailField");
    const passwordField = document.getElementById("passwordField");
    const togglePassword = document.getElementById("togglePassword");

    const BASE_URL = "https://hambak-tech-services.onrender.com/api";

    let loginMode = true;

    togglePassword.addEventListener("click", () => {
      if (passwordField.type === "password") {
        passwordField.type = "text";
        togglePassword.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
      } else {
        passwordField.type = "password";
        togglePassword.innerHTML = '<i class="fa-solid fa-eye"></i>';
      }
    });

    toggleForm.addEventListener("click", () => {
      loginMode = !loginMode;
      
      if (loginMode) {
        formTitle.innerHTML = "Customer Login";
        formSubtitle.innerHTML = "Access your dashboard & services";
        submitBtn.innerHTML = "Login";
        toggleForm.innerHTML = "Create New Account";
        forgotPasswordWrapper.style.display = "block";
        nameWrapper.style.display = "none";
        usernameWrapper.style.display = "none";
        phoneWrapper.style.display = "none";
        
        emailField.placeholder = "Email Address or Username";
        nameField.removeAttribute("required");
        usernameField.removeAttribute("required");
        phoneField.removeAttribute("required");
        
        passwordField.setAttribute("autocomplete", "current-password");
      } else {
        formTitle.innerHTML = "Create Account";
        formSubtitle.innerHTML = "Join Hambak Tech & Services Ecosystem";
        submitBtn.innerHTML = "Register";
        toggleForm.innerHTML = "Already Have Account?";
        forgotPasswordWrapper.style.display = "none";
        nameWrapper.style.display = "block";
        usernameWrapper.style.display = "block";
        phoneWrapper.style.display = "block";
        
        emailField.placeholder = "Email Address";
        nameField.setAttribute("required", "true");
        usernameField.setAttribute("required", "true");
        phoneField.setAttribute("required", "true");
        
        passwordField.setAttribute("autocomplete", "new-password");
      }
    });

    authForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const inputIdentityValue = emailField.value.trim();
      const password = passwordField.value;

      // PIPELINE WORKFLOW: USER REGISTRATION
      if (!loginMode) {
        const name = nameField.value.trim();
        const username = usernameField.value.trim();
        const phone = phoneField.value.trim();

        if (!name || !username || !phone || !inputIdentityValue || !password) {
          alert("Please clear all input parameter fields completely.");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = "Registering Account...";

        try {
          const response = await fetch(`${BASE_URL}/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, username, email: inputIdentityValue, phone, password })
          });

          const data = await response.json();

          if (response.ok || data.success) {
            alert("Registration Successful!");
            loginMode = false; 
            toggleForm.click(); 
            emailField.value = inputIdentityValue;
            passwordField.value = password;
          } else {
            alert("Registration Unsuccessful: " + (data.message || "Invalid setup metrics."));
          }
        } catch (error) {
          console.error("Critical Registry Interface Exception:", error);
          alert("Network execution failure or database sleeping. Please try again.");
        }

        submitBtn.disabled = false;
        submitBtn.innerHTML = "Register";
      }

      // PIPELINE WORKFLOW: USER SECURITY ACCESS LOGIN
      else {
        if (!inputIdentityValue || !password) {
          alert("Please fill your registered credential matrix values.");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = "Authorizing Access...";

        try {
          const response = await fetch(`${BASE_URL}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ loginIdentity: inputIdentityValue, password })
          });

          const data = await response.json();

          if (response.ok || data.success) {
            // KEY SYNC CORRECTION: Match exactly what the stable dashboard.js looks for
            localStorage.setItem("user", JSON.stringify(data.user));
            localStorage.setItem("token", data.token);
            localStorage.setItem("role", data.user?.role || "customer");

            alert("Access Granted! Proceeding to Dashboard Area.");

            if (data.user && data.user.role === "admin") {
              window.location.href = "admin.html";
            } else {
              window.location.href = "dashboard.html";
            }
          } else {
            alert("Authentication Denied: " + (data.message || "Mismatch password or identifier data parameters."));
          }
        } catch (error) {
          console.error("Critical Login Interface Exception:", error);
          alert("Database spin-up delay or connection dropped. Please wait a few seconds and re-submit.");
        }

        submitBtn.disabled = false;
        submitBtn.innerHTML = "Login";
      }
    });
  </script>
</body>
</html>
