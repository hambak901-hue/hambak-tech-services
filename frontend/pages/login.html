<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Register | HAMBAK TECH & SERVICES</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #081120;
    }

    /* =========================
    NAVBAR
    ========================= */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 8%;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      display: flex;
      flex-direction: column;
    }

    .logo span {
      font-size: 2rem;
      font-weight: bold;
      color: #f5b942;
    }

    .logo small {
      color: white;
      font-weight: bold;
    }

    .nav-links {
      display: flex;
      gap: 30px;
    }

    .nav-links a {
      text-decoration: none;
      color: white;
      font-weight: 600;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #f5b942;
    }

    /* =========================
    AUTH SECTION
    ========================= */
    .auth-section {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 8%;
      background: linear-gradient(135deg, #081120, #0d47a1);
    }

    .auth-container {
      width: 100%;
      max-width: 500px;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-header h1 {
      font-size: 2.5rem;
      color: #0f172a;
      margin-bottom: 10px;
    }

    .auth-header p {
      color: #555;
    }

    /* =========================
    FORM MATRIX
    ========================= */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-group {
      position: relative;
    }

    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
    }

    .input-group input {
      width: 100%;
      padding: 15px 45px 15px 45px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #0d47a1;
    }

    .auth-btn {
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #0d47a1;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    .auth-btn:hover {
      background: #1565c0;
    }

    .auth-switch {
      text-align: center;
      margin-top: 20px;
      color: #555;
    }

    .auth-switch span {
      color: #0d47a1;
      cursor: pointer;
      font-weight: 600;
    }

    .forgot-password {
      text-align: right;
      margin-top: -10px;
    }

    .forgot-password a {
      color: #0d47a1;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.95rem;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }

    .demo-info {
      margin-top: 30px;
      padding: 20px;
      background: #f1f5f9;
      border-radius: 10px;
      font-size: 0.95rem;
      color: #475569;
      line-height: 1.8;
    }

    .whatsapp-float {
      position: fixed;
      width: 60px;
      height: 60px;
      bottom: 25px;
      right: 25px;
      background: #25d366;
      color: white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      z-index: 1000;
    }

    @media(max-width: 768px) {
      .navbar {
        flex-direction: column;
        gap: 20px;
      }
      .nav-links {
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
      }
      .auth-container {
        padding: 30px 20px;
      }
      .auth-header h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <header class="navbar">
    <div class="logo">
      <span>HAMBAK</span>
      <small>TECH & SERVICES</small>
    </div>
    <nav class="nav-links">
      <a href="../index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="shop.html">Shop</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="auth-section">
    <div class="auth-container">
      
      <div class="auth-header">
        <h1 id="formTitle">Customer Login</h1>
        <p id="formSubtitle">Access your dashboard & services</p>
      </div>

      <form class="auth-form" id="authForm">
        
        <div class="input-group" id="nameWrapper" style="display:none">
          <i class="fa-solid fa-user"></i>
          <input type="text" placeholder="Full Name" id="nameField">
        </div>

        <div class="input-group" id="usernameWrapper" style="display:none">
          <i class="fa-solid fa-at"></i>
          <input type="text" placeholder="Username" id="usernameField">
        </div>

        <div class="input-group" id="phoneWrapper" style="display:none">
          <i class="fa-solid fa-phone"></i>
          <input type="tel" placeholder="Phone Number" id="phoneField">
        </div>

        <div class="input-group">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" placeholder="Email Address" id="emailField" required>
        </div>

        <div class="input-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password" placeholder="Password" id="passwordField" required>
          <span id="togglePassword" style="position:absolute; right:15px; top:50%; transform:translateY(-50%); cursor:pointer; color:#888;">
            <i class="fa-solid fa-eye"></i>
          </span>
        </div>

        <div class="forgot-password" id="forgotPasswordWrapper">
          <a href="forgot-password.html">Forgot Password?</a>
        </div>

        <button type="submit" class="auth-btn" id="submitBtn">Login</button>
      </form>

      <div class="auth-switch">
        <span id="toggleForm">Create New Account</span>
      </div>

      <div class="demo-info">
        <strong>System Information:</strong><br>
        Ensure you fill correct inputs when creating an account. Built for live production tracking.
      </div>

    </div>
  </section>

  <a href="https://wa.me/2349155104724" class="whatsapp-float">
    <i class="fa-brands fa-whatsapp"></i>
  </a>

  <script>
    const authForm = document.getElementById("authForm");
    const toggleForm = document.getElementById("toggleForm");
    const formTitle = document.getElementById("formTitle");
    const formSubtitle = document.getElementById("formSubtitle");
    const submitBtn = document.getElementById("submitBtn");
    const forgotPasswordWrapper = document.getElementById("forgotPasswordWrapper");

    const nameWrapper = document.getElementById("nameWrapper");
    const usernameWrapper = document.getElementById("usernameWrapper");
    const phoneWrapper = document.getElementById("phoneWrapper");

    const nameField = document.getElementById("nameField");
    const usernameField = document.getElementById("usernameField");
    const phoneField = document.getElementById("phoneField");
    const emailField = document.getElementById("emailField");
    const passwordField = document.getElementById("passwordField");
    const togglePassword = document.getElementById("togglePassword");

    // Live Render Production Endpoint Base Link
    const BASE_URL = "https://hambak-tech-services.onrender.com/api";

    // Show/Hide Password Toggle Function
    togglePassword.addEventListener("click", () => {
      if (passwordField.type === "password") {
        passwordField.type = "text";
        togglePassword.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
      } else {
        passwordField.type = "password";
        togglePassword.innerHTML = '<i class="fa-solid fa-eye"></i>';
      }
    });

    let loginMode = true;

    // Toggle view layout between Login and Registration
    toggleForm.addEventListener("click", () => {
      loginMode = !loginMode;
      authForm.reset();

      if (loginMode) {
        formTitle.innerHTML = "Customer Login";
        formSubtitle.innerHTML = "Access your dashboard & services";
        submitBtn.innerHTML = "Login";
        toggleForm.innerHTML = "Create New Account";
        forgotPasswordWrapper.style.display = "block";
        nameWrapper.style.display = "none";
        usernameWrapper.style.display = "none";
        phoneWrapper.style.display = "none";
      } else {
        formTitle.innerHTML = "Create Account";
        formSubtitle.innerHTML = "Join Hambak Tech & Services Ecosystem";
        submitBtn.innerHTML = "Register";
        toggleForm.innerHTML = "Already Have Account?";
        forgotPasswordWrapper.style.display = "none";
        nameWrapper.style.display = "block";
        usernameWrapper.style.display = "block";
        phoneWrapper.style.display = "block";
      }
    });

    // Handle Form Operations (Login / Register)
    authForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = emailField.value.trim();
      const password = passwordField.value;

      // WORKFLOW: REGISTRATION ROUTE
      if (!loginMode) {
        const name = nameField.value.trim();
        const username = usernameField.value.trim();
        const phone = phoneField.value.trim();

        if (!name || !username || !phone || !email || !password) {
          alert("Please fill all fields completely.");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = "Registering...";

        try {
          const response = await fetch(`${BASE_URL}/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, username, email, phone, password })
          });

          const data = await response.json();

          if (data.success) {
            alert("Registration successful! You can now log in.");
            toggleForm.click(); // Returns user safely to login screen
          } else {
            alert(data.message || "Registration failed.");
          }
        } catch (error) {
          console.error("Client side error during registration fetch:", error);
          alert("Connection error. Could not reach server cluster.");
        }

        submitBtn.disabled = false;
        submitBtn.innerHTML = "Register";
      }

      // WORKFLOW: AUTHENTICATION LOGIN ROUTE
      else {
        if (!email || !password) {
          alert("Please fill out your credentials.");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = "Logging in...";

        try {
          const response = await fetch(`${BASE_URL}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
          });

          const data = await response.json();

          if (data.success) {
            // Save parameters exactly as expected by dashboard verification filters
            localStorage.setItem("hambak_user", JSON.stringify(data.user));
            localStorage.setItem("hambak_token", data.token);

            alert("Login Successful!");

            // Role-Based Redirect Router Matrix
            if (data.user.role === "admin") {
              window.location.href = "admin.html";
            } else {
              window.location.href = "dashboard.html";
            }
          } else {
            alert(data.message || "Invalid email or password combination.");
          }
        } catch (error) {
          console.error("Client side error during login fetch:", error);
          alert("Server failed to respond. Check your web connection.");
        }

        submitBtn.disabled = false;
        submitBtn.innerHTML = "Login";
      }
    });
  </script>
</body>

</html>
