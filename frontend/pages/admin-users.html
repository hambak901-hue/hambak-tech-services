<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Users | HAMBAK</title>
    <script src="js/sessionGuard.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: #081120;
            padding: 30px 20px;
            position: fixed;
            height: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h2 {
            color: #f5b942;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu a {
            text-decoration: none;
            color: #cbd5e1;
            padding: 14px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }

        .menu a:hover, .menu a.active {
            background: #0d47a1;
            color: white;
        }

        .main {
            margin-left: 260px;
            flex: 1;
            padding: 40px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .table-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th,
        table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: left;
        }

        table th {
            background: #0d47a1;
        }

        .role-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: capitalize;
        }

        .admin-role {
            background: #16a34a;
        }

        .user-role {
            background: #2563eb;
        }

        .action-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .balance-input {
            width: 90px;
            padding: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #fff;
            border-radius: 6px;
            text-align: center;
        }

        .fund-btn {
            background: #16a34a;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .fund-btn:hover {
            background: #15803d;
        }

        .delete-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .delete-btn:hover {
            background: #b91c1c;
        }

        @media(max-width:900px) {
            .admin-container {
                flex-direction: column;
            }
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }
            .main {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

<div class="admin-container">

    <div class="sidebar">
        <div class="logo">
            <h2>HAMBAK</h2>
            <p>ADMIN PANEL</p>
        </div>
        <div class="menu">
            <a href="admin.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="admin-services.html"><i class="fa-solid fa-briefcase"></i> Services</a>
            <a href="admin-users.html" class="active"><i class="fa-solid fa-users"></i> Users</a>
            <a href="admin-orders.html"><i class="fa-solid fa-cart-shopping"></i> Orders</a>
            <a href="#" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <h1>Users Management</h1>
            <h3 id="adminName">Admin</h3>
        </div>

        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Wallet Balance</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="usersTable"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
    /* =========================
    AUTH & PRIVILEGE GUARD
    ========================= */
    const user = JSON.parse(localStorage.getItem("hambak_user")) || JSON.parse(localStorage.getItem("user"));
    const token = localStorage.getItem("hambak_token") || localStorage.getItem("token");

    if (!user || !token || user.role.toLowerCase() !== "admin") {
        localStorage.clear();
        window.location.href = "login.html";
    } else {
        document.getElementById("adminName").innerHTML = user.name || "Administrator";
    }

    /* =========================
    PRODUCTION API CONFIG
    ========================= */
    const API_URL = "https://hambak-tech-services.onrender.com/api";

    /* =========================
    LOAD USERS
    ========================= */
    async function loadUsers() {
        try {
            const response = await fetch(`${API_URL}/admin/users`, {
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            });
            
            const data = await response.json();
            const table = document.getElementById("usersTable");
            table.innerHTML = "";

            const usersList = Array.isArray(data) ? data : (data.users || []);

            if (usersList.length === 0) {
                table.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:20px; color:#cbd5e1;">No accounts registered yet</td></tr>`;
                return;
            }

            usersList.forEach(u => {
                const isAdminRole = u.role && u.role.toLowerCase() === "admin";
                const userId = u._id || u.id;
                const balance = u.walletBalance !== undefined ? u.walletBalance : 0;
                
                table.innerHTML += `
                <tr>
                    <td>${u.name || 'N/A'}</td>
                    <td>${u.email || 'N/A'}</td>
                    <td>
                        <span class="role-badge ${isAdminRole ? 'admin-role' : 'user-role'}">
                            ${u.role || 'user'}
                        </span>
                    </td>
                    <td>₦${Number(balance).toLocaleString()}</td>
                    <td>
                        <div class="action-group">
                            <input type="number" id="amt-${userId}" class="balance-input" placeholder="Amount">
                            <button class="fund-btn" onclick="modifyBalance('${userId}', 'add')">Fund</button>
                            <button class="fund-btn" style="background:#ea580c" onclick="modifyBalance('${userId}', 'deduct')">Deduct</button>
                            <button class="delete-btn" onclick="deleteUser('${userId}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
                `;
            });
        } catch (error) {
            console.error("Error streaming user matrix:", error);
            document.getElementById("usersTable").innerHTML = `<tr><td colspan="5" style="text-align:center; color:#dc2626;">Failed to connect to administrative server layer.</td></tr>`;
        }
    }

    /* =========================
    MANAGE WALLET BALANCE
    ========================= */
    async function modifyBalance(userId, action) {
        const inputField = document.getElementById(`amt-${userId}`);
        const amount = parseFloat(inputField.value);

        if (!amount || amount <= 0) {
            alert("Please enter a valid amount greater than zero.");
            return;
        }

        const confirmAction = confirm(`Are you sure you want to ${action} ₦${amount} for this user?`);
        if (!confirmAction) return;

        try {
            const response = await fetch(`${API_URL}/admin/users/${userId}/wallet`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ amount, action })
            });

            const data = await response.json();
            if (response.ok || data.success) {
                alert("Wallet modified successfully");
                loadUsers();
            } else {
                alert(data.message || "Failed to update wallet balance.");
            }
        } catch (error) {
            console.error("Wallet adjustment communication error:", error);
            alert("Error trying to process wallet adjustment route.");
        }
    }

    /* =========================
    DELETE USER
    ========================= */
    async function deleteUser(id) {
        const confirmDelete = confirm("Are you completely sure you want to delete this user profile?");
        if (!confirmDelete) return;

        try {
            const response = await fetch(`${API_URL}/admin/users/${id}`, {
                method: "DELETE",
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            });
            const data = await response.json();
            
            if (response.ok || data.success) {
                alert("User profile deleted successfully");
                loadUsers();
            } else {
                alert(data.message || "Failed to remove user");
            }
        } catch (error) {
            console.error("Deletion route error:", error);
            alert("Error trying to contact account removal route");
        }
    }

    /* =========================
    LOGOUT LOGIC
    ========================= */
    document.getElementById("logoutBtn").addEventListener("click", (e) => {
        e.preventDefault();
        localStorage.clear();
        window.location.href = "login.html";
    });

    loadUsers();
</script>

<script src="script.js"></script>
    
</body>
</html>
