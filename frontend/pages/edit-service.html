<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Service | HAMBAK</title>
    <script src="js/sessionGuard.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin:0; font-family:Arial, sans-serif; background:#0f172a; color:white; }
        .admin-container { display:flex; min-height:100vh; }
        .sidebar { width:260px; background:#081120; padding:30px 20px; position:fixed; height:100%; }
        .logo h2 { color:#f5b942; text-align:center; }
        .menu a { text-decoration:none; color:#cbd5e1; padding:14px; border-radius:12px; display:flex; align-items:center; gap:12px; transition:0.3s; }
        .menu a:hover, .menu a.active { background:#0d47a1; color:white; }
        .main { margin-left:260px; flex:1; padding:40px; }
        .form-box { background:#1e293b; padding:30px; border-radius:20px; max-width:600px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display:block; margin-bottom:8px; color:#cbd5e1; }
        .form-group input, .form-group select { width:100%; padding:12px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:#0f172a; color:white; box-sizing:border-box; }
        .btn-submit { background:#16a34a; color:white; border:none; padding:12px 20px; border-radius:8px; cursor:pointer; font-weight:bold; width:100%; transition:0.3s; }
        .btn-submit:hover { background:#15803d; }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="sidebar">
        <div class="logo"><h2>HAMBAK</h2><p>ADMIN PANEL</p></div>
        <div class="menu">
            <a href="admin.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="admin-services.html" class="active"><i class="fa-solid fa-briefcase"></i> Services</a>
            <a href="admin-users.html"><i class="fa-solid fa-users"></i> Users</a>
            <a href="admin-orders.html"><i class="fa-solid fa-cart-shopping"></i> Orders</a>
        </div>
    </div>
    <div class="main">
        <h1>Modify Service Parameters</h1>
        <div class="form-box">
            <form id="editServiceForm">
                <div class="form-group">
                    <label>Service Name</label>
                    <input type="text" id="serviceName" required>
                </div>
                <div class="form-group">
                    <label>Category Layout Node</label>
                    <select id="serviceCategory" required>
                        <option value="ict">ICT Core & Software</option>
                        <option value="business">Business & Corporate Print</option>
                        <option value="financial">Agency Banking Matrix</option>
                        <option value="marketing">Campaign & Advisory</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Base Price (₦)</label>
                    <input type="number" id="servicePrice" required>
                </div>
                <button type="submit" class="btn-submit">Deploy Operational Changes</button>
            </form>
        </div>
    </div>
</div>
<script>
    const API_URL = "https://hambak-tech-services.onrender.com/api";
    const token = localStorage.getItem("token") || localStorage.getItem("hambak_token");
    
    // Extract ID parameter out of current window address string
    const urlParams = new URLSearchParams(window.location.search);
    const serviceId = urlParams.get('id');

    if (!serviceId) {
        alert("No target service ID defined.");
        window.location.href = "admin-services.html";
    }

    async function loadServiceDetails() {
        try {
            const res = await fetch(`${API_URL}/services`, {
                headers: { "Authorization": `Bearer ${token}` }
            });
            const services = await res.json();
            const service = services.find(s => (s._id || s.id) === serviceId);

            if (service) {
                document.getElementById("serviceName").value = service.name || service.serviceName;
                document.getElementById("serviceCategory").value = service.category?.toLowerCase();
                document.getElementById("servicePrice").value = service.price !== undefined ? service.price : service.servicePrice;
            }
        } catch (err) { console.error("Failed to load service properties:", err); }
    }

    document.getElementById("editServiceForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const updatePayload = {
            name: document.getElementById("serviceName").value,
            category: document.getElementById("serviceCategory").value,
            price: parseFloat(document.getElementById("servicePrice").value)
        };

        try {
            // FIXED: Pointed to backend administrative update endpoint context
            const res = await fetch(`${API_URL}/admin/services/${serviceId}`, {
                method: "PUT",
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(updatePayload)
            });

            if (res.ok) {
                alert("Service blueprint modified successfully!");
                window.location.href = "admin-services.html";
            } else { alert("Failed to deploy changes to production node."); }
        } catch (err) { console.error(err); }
    });

    loadServiceDetails();
</script>
</body>
</html>
